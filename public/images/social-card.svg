<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MindState social share card</title>
  <desc id="desc">MindState app for building and listening to binaural beat mixes on Google Play.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f45f11"/>
      <stop offset="0.55" stop-color="#ff7b22"/>
      <stop offset="1" stop-color="#8b254f"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1">
      <stop offset="0" stop-color="#fff7f0" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#fff7f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="1" cy="0" r="1">
      <stop offset="0" stop-color="#681f36" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#681f36" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <circle cx="150" cy="90" r="320" fill="url(#glowLeft)"/>
  <circle cx="1040" cy="70" r="300" fill="url(#glowRight)"/>
  <path d="M70 500C220 390 370 598 540 482C690 379 795 409 910 482C1000 539 1074 538 1150 493" fill="none" stroke="#fff7f0" stroke-opacity="0.22" stroke-width="3"/>
  <path d="M70 530C220 420 370 628 540 512C690 409 795 439 910 512C1000 569 1074 568 1150 523" fill="none" stroke="#fff7f0" stroke-opacity="0.12" stroke-width="3"/>

  <rect x="72" y="72" width="1056" height="486" rx="42" fill="#fff7f0" fill-opacity="0.92" stroke="#681f36" stroke-opacity="0.35" stroke-width="2" filter="url(#shadow)"/>

  <g transform="translate(116 112)">
    <rect x="0" y="0" width="128" height="128" rx="32" fill="#f45f11"/>
    <circle cx="64" cy="64" r="34" fill="none" stroke="#fff7f0" stroke-width="5"/>
    <path d="M44 64c0-11 9-20 20-20s20 9 20 20-9 20-20 20" fill="none" stroke="#fff7f0" stroke-width="5" stroke-linecap="round"/>
    <path d="M84 64c0 11-9 20-20 20" fill="none" stroke="#fff7f0" stroke-width="5" stroke-linecap="round"/>
  </g>

  <text x="284" y="144" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="5" fill="#8b254f">BINAURAL BEAT STUDIO</text>
  <text x="116" y="300" font-family="ui-sans-serif, system-ui, sans-serif" font-size="88" font-weight="800" fill="#681f36">MindState</text>
  <text x="116" y="362" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#a8745d">Custom mixes, Quick and Full editors, 33 included mixes</text>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#681f36">
    <rect x="116" y="414" width="118" height="48" rx="24" fill="#f45f11" fill-opacity="0.14" stroke="#f45f11" stroke-opacity="0.75"/>
    <text x="175" y="446" text-anchor="middle">Mixes</text>
    <rect x="254" y="414" width="150" height="48" rx="24" fill="#f45f11" fill-opacity="0.14" stroke="#f45f11" stroke-opacity="0.75"/>
    <text x="329" y="446" text-anchor="middle">Quick editor</text>
    <rect x="424" y="414" width="138" height="48" rx="24" fill="#f45f11" fill-opacity="0.14" stroke="#f45f11" stroke-opacity="0.75"/>
    <text x="493" y="446" text-anchor="middle">Full editor</text>
    <rect x="582" y="414" width="188" height="48" rx="24" fill="#f45f11" fill-opacity="0.14" stroke="#f45f11" stroke-opacity="0.75"/>
    <text x="676" y="446" text-anchor="middle">Included mixes</text>
    <rect x="790" y="414" width="168" height="48" rx="24" fill="#f45f11" fill-opacity="0.14" stroke="#f45f11" stroke-opacity="0.75"/>
    <text x="874" y="446" text-anchor="middle">Google Play</text>
  </g>

  <text x="116" y="512" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700" fill="#681f36">binauralbeatstudio.com</text>
  <text x="1084" y="512" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#8b254f">Unlock your brain's potential.</text>
</svg>
